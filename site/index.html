<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Repositorio UX/UI</title>
    <meta
      name="description"
      content="Catalogo UX/UI con secciones destacadas, filtros y exploracion visual."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="ambient ambient-a"></div>
    <div class="ambient ambient-b"></div>
    <div class="noise-layer"></div>

    <header class="topbar shell">
      <a class="brand" href="#top">
        <span class="brand-mark">R</span>
        <span>
          <strong>Repositorio UX/UI</strong>
          <small>curated operating system</small>
        </span>
      </a>
    </header>

    <main id="top">
      <section class="hero-mosaic shell">
        <div class="hero-mosaic-head reveal" style="--delay:40ms">
          <p class="eyebrow">Section access</p>
          <h1>Entrá por la sección que necesites.</h1>
        </div>
        <div id="hero-mosaic-grid" class="hero-mosaic-grid"></div>
      </section>

      <section class="content-shell shell" id="explorar">
        <div class="toolbar reveal" style="--delay:120ms">
          <label class="search-shell search-shell-flat">
            <span class="search-icon">/</span>
            <input
              id="search-input"
              type="search"
              placeholder="Buscar recursos, grupos o dominios..."
            />
          </label>
          <div id="filter-chips" class="filter-chips"></div>
        </div>

        <section class="section-headline reveal" style="--delay:160ms">
          <div>
            <p class="eyebrow">Main library</p>
            <h2>Exploracion por secciones</h2>
          </div>
          <p class="section-headline-copy">
            La portada ahora funciona como mapa visual. Debajo queda la biblioteca completa.
          </p>
        </section>

        <section id="sections-root" class="sections-root"></section>
      </section>
    </main>

    <script src="./data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
