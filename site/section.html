<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Section | Repositorio UX/UI</title>
    <meta
      name="description"
      content="Detalle por seccion del repositorio UX/UI con vista estilo terminal."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="ambient ambient-a"></div>
    <div class="ambient ambient-b"></div>
    <div class="noise-layer"></div>

    <header class="topbar shell">
      <a class="brand" href="./index.html">
        <span class="brand-mark">R</span>
        <span>
          <strong>Repositorio UX/UI</strong>
          <small>section view</small>
        </span>
      </a>
      <nav class="topbar-nav">
        <a href="./index.html">Home</a>
        <button type="button" class="topbar-cta" data-open-add-modal>Agregar recurso</button>
      </nav>
    </header>

    <main class="section-page shell">
      <section id="section-shell" class="section-shell"></section>
    </main>

    <div class="add-modal" id="add-modal" hidden>
      <div class="add-modal-backdrop" data-close-add-modal></div>
      <div class="add-modal-panel" role="dialog" aria-modal="true" aria-labelledby="add-modal-title">
        <div class="add-modal-head">
          <div>
            <p class="eyebrow">Cloud capture</p>
            <h2 id="add-modal-title">Guardar recurso en la base</h2>
          </div>
          <button type="button" class="add-modal-close" data-close-add-modal>cerrar</button>
        </div>

        <div class="add-connection" id="add-connection-state">
          <span class="connection-bullet" aria-hidden="true"></span>
          <div>
            <strong id="add-connection-title">Base no conectada</strong>
            <p id="add-connection-message">Completá config.js para activar el guardado en tiempo real.</p>
          </div>
        </div>

        <form id="add-resource-form" class="add-modal-form">
          <label class="form-field">
            <span>Nombre</span>
            <input name="title" type="text" placeholder="Ej: AI needs UI" required />
          </label>

          <div class="form-grid">
            <label class="form-field">
              <span>Categoría</span>
              <select name="section" id="add-resource-section"></select>
            </label>
            <label class="form-field">
              <span>Subcategoría</span>
              <select name="group" id="add-resource-group"></select>
            </label>
          </div>

          <div class="form-grid">
            <label class="form-field">
              <span>Link</span>
              <input name="url" type="url" placeholder="https://..." required />
            </label>
            <label class="form-field">
              <span>Tags</span>
              <input name="tags" type="text" placeholder="AI, product, article" />
            </label>
          </div>

          <label class="form-field">
            <span>Nota</span>
            <textarea name="note" rows="4" placeholder="Detalle o por qué vale la pena guardarlo"></textarea>
          </label>

          <label class="form-field is-disabled">
            <span>Archivo (siguiente etapa)</span>
            <input name="file" type="file" disabled />
            <small class="form-help">La carga de PDFs y archivos reales la conectamos en la siguiente iteración con storage.</small>
          </label>

          <div class="form-actions">
            <button type="submit" class="modal-primary">Guardar en la base</button>
            <a class="modal-secondary" href="./add.html">Ver setup</a>
          </div>
        </form>

        <div class="add-modal-output" id="add-modal-output" hidden>
          <div class="add-result-box" id="add-result-box">
            <p class="eyebrow" id="add-result-eyebrow">Estado</p>
            <strong class="add-result-title" id="add-result-title"></strong>
            <p class="add-modal-note" id="add-result-message"></p>
            <pre id="add-resource-preview" hidden></pre>
          </div>
        </div>
      </div>
    </div>

    <script src="./config.js"></script>
    <script src="./data.js"></script>
    <script src="./live-data.js"></script>
    <script src="./section.js"></script>
  </body>
</html>
